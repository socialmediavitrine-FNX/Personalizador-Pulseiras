<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personalizador | Vitrine Acessórios</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vitrine-blue: #1b31e0; --primary: #007bff; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .brand-header { background: var(--vitrine-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .brand-logo img { height: 35px; }

        .toolbar { background: #fff; padding: 10px; border-bottom: 1px solid #ddd; display: flex; gap: 15px; align-items: center; overflow-x: auto; z-index: 10; }
        .group { display: flex; flex-direction: column; gap: 5px; border-right: 1px solid #eee; padding-right: 15px; flex-shrink: 0; }
        label { font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; }
        
        .btn { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; background: white; cursor: pointer; font-weight: bold; font-size: 11px; display: flex; align-items: center; gap: 5px; }
        .btn-add { background: var(--primary); color: white; border: none; }

        .color-palette { display: flex; gap: 6px; align-items: center; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(0,0,0,0.1); }

        /* Ajuste Mestre de Scroll */
        .workspace { 
            flex: 1; 
            overflow: auto !important; 
            padding: 20px; 
            background: #475569; 
            display: block;
            -webkit-overflow-scrolling: touch; 
            position: relative;
            touch-action: auto !important; /* Permite que o navegador decida o scroll */
        }
        
        canvas { 
            box-shadow: 0 0 50px rgba(0,0,0,0.5); 
            border-radius: 4px; 
            touch-action: auto !important; /* Libera o gesto de pinça e pan no vazio */
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        #guideModal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; max-width: 450px; width: 85%; }

        .footer-actions { background: white; padding: 10px; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-exp { border: none; padding: 10px 15px; font-size: 12px; font-weight: bold; border-radius: 6px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="guideModal">
    <div class="modal-content">
        <h2 style="margin-top:0; color:var(--vitrine-blue)">📖 Dica de Navegação</h2>
        <p style="font-size:14px; color:#444;">Para mover a tela, você pode clicar e arrastar em <b>qualquer parte branca</b> que não tenha texto.<br><br>Se quiser mover um texto, clique diretamente sobre ele.</p>
        <button class="btn btn-add" style="width:100%; justify-content:center; padding:12px;" onclick="toggleGuide()">ENTENDI</button>
    </div>
</div>

<div class="brand-header">
    <div class="brand-logo"><img src="logo.png" alt="Vitrine Acessórios"></div>
    <button class="btn" style="background:#6366f1; color:white; border:none;" onclick="toggleGuide()">AJUDA</button>
</div>

<div class="toolbar">
    <div class="group">
        <label>1. Modelos</label>
        <div style="display:flex; gap:4px;">
            <button class="btn btn-add" onclick="addPulseira('adulto')">+ Adulto</button>
            <button class="btn btn-add" onclick="addPulseira('infantil')" style="background:#6f42c1">+ Infantil</button>
        </div>
    </div>
    <div class="group">
        <label>2. Criar</label>
        <div style="display:flex; gap:4px;">
            <button class="btn" onclick="addTexto()">+ Texto</button>
            <button class="btn" onclick="document.getElementById('imgInp').click()">+ Foto</button>
            <input type="file" id="imgInp" hidden onchange="uploadImg(this)">
        </div>
    </div>
    <div class="group">
        <label>3. Cores</label>
        <div class="color-palette">
            <div class="color-dot" style="background:#FF1493" onclick="mudarCor('#FF1493')"></div>
            <div class="color-dot" style="background:#0000FF" onclick="mudarCor('#0000FF')"></div>
            <div class="color-dot" style="background:#000000" onclick="mudarCor('#000000')"></div>
            <div class="color-dot" style="background:#CCFF00" onclick="mudarCor('#CCFF00')"></div>
            <input type="color" onchange="mudarCor(this.value)" style="width:25px; height:25px; cursor:pointer;">
        </div>
    </div>
    <div class="group" style="border:none;">
        <label>4. Ações</label>
        <div style="display:flex; gap:4px;">
            <button class="btn" onclick="undo()">↩</button>
            <button class="btn" style="color:#ef4444" onclick="removerSelecionado()">🗑</button>
        </div>
    </div>
</div>

<div class="workspace">
    <canvas id="c"></canvas>
</div>

<div class="footer-actions">
    <button class="btn-exp" style="background:#0ea5e9" onclick="baixarPNG()">SALVAR PNG</button>
    <button class="btn-exp" style="background:#f59e0b" onclick="exportarSVG()">SVG (COREL)</button>
    <button class="btn-exp" style="background:#22c55e" onclick="enviarWhatsApp()">FINALIZAR</button>
</div>

<script>
    const canvas = new fabric.Canvas('c', { 
        width: 1000, 
        height: 650, 
        backgroundColor: '#ffffff',
        selection: false,
        allowTouchScrolling: true 
    });

    // LÓGICA DE LIBERAÇÃO DE TOQUE
    canvas.on('mouse:down', function(opt) {
        if (!opt.target) {
            // Se não clicou em nada, o canvas fica "inerte" para o navegador assumir o scroll
            canvas.allowTouchScrolling = true;
            canvas.setCursor('default');
        } else {
            // Se clicou em algo, bloqueia scroll para permitir edição
            canvas.allowTouchScrolling = false;
        }
    });

    // --- FUNÇÕES CORE ---
    function addPulseira(tipo) {
        const ts = new Date().getTime();
        fabric.loadSVGFromURL(`${tipo === 'adulto' ? 'pulseira-adulto.svg' : 'pulseira-infantil.svg'}?t=${ts}`, (objects, options) => {
            const p = fabric.util.groupSVGElements(objects, options);
            p.set({ isPulseira: true, tipoRef: tipo, hasControls: false, lockMovementX: true, lockMovementY: true, selectable: true });
            p.scaleToWidth(tipo === 'adulto' ? 900 : 750);
            canvas.add(p); p.sendToBack(); reestruturarAmbiente();
        });
    }

    function reestruturarAmbiente() {
        const pulseiras = canvas.getObjects().filter(obj => obj.isPulseira);
        canvas.getObjects().filter(obj => obj.isLegenda).forEach(l => canvas.remove(l));
        let currentY = 70;
        pulseiras.forEach(p => {
            p.set({ top: currentY, left: 45 }).setCoords();
            const legenda = new fabric.Text(p.tipoRef.toUpperCase(), {
                left: 50, top: currentY - 25, fontSize: 11, fill: '#94a3b8', selectable: false, isLegenda: true, fontWeight: 'bold'
            });
            canvas.add(legenda); currentY += 280;
        });
        canvas.setHeight(Math.max(650, currentY)); canvas.renderAll();
    }

    function mudarCor(c) {
        canvas.getActiveObjects().forEach(o => {
            if (o.type.includes('text')) o.set('fill', c);
            else if (o.isPulseira) o.getObjects().forEach(child => { child.set('fill', c); child.set('stroke', c); });
            else if (o.type === 'image') {
                o.filters = [new fabric.Image.filters.BlendColor({ color: c, mode: 'tint', alpha: 1 })];
                o.applyFilters();
            }
        });
        canvas.renderAll(); saveHistory();
    }

    function addTexto() { 
        const t = new fabric.IText('Clique aqui', { left: 400, top: 150, fontSize: 35, fill: '#333', fontFamily: 'Inter', fontWeight: 'bold' }); 
        canvas.add(t); canvas.setActiveObject(t); 
    }

    function uploadImg(input) { 
        if (input.files[0]) { 
            const r = new FileReader(); 
            r.onload = (e) => { 
                fabric.Image.fromURL(e.target.result, img => { img.scaleToWidth(120); canvas.add(img); canvas.setActiveObject(img); }); 
            }; 
            r.readAsDataURL(input.files[0]); 
        } 
    }

    let history = []; let historyIndex = -1; let isTransitioning = false;
    function saveHistory() {
        if (isTransitioning) return;
        const json = JSON.stringify(canvas.toJSON(['isPulseira', 'tipoRef', 'isLegenda']));
        if (historyIndex < history.length - 1) history = history.slice(0, historyIndex + 1);
        history.push(json); historyIndex++;
        localStorage.setItem('vitrine_project', json);
    }
    function undo() { if (historyIndex > 0) { isTransitioning = true; historyIndex--; applyHistory(); } }
    function applyHistory() { canvas.loadFromJSON(history[historyIndex], () => { canvas.renderAll(); isTransitioning = false; }); }
    canvas.on('object:added', saveHistory); canvas.on('object:modified', saveHistory); canvas.on('object:removed', saveHistory);

    function baixarPNG() { const l = document.createElement('a'); l.download = 'arte.png'; l.href = canvas.toDataURL({ multiplier: 2 }); l.click(); }
    function exportarSVG() { const b = new Blob([canvas.toSVG()], { type: 'image/svg+xml' }); const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = 'projeto.svg'; l.click(); }
    function enviarWhatsApp() { window.open(`https://api.whatsapp.com/send?phone=5518981212934&text=Olá! Montei minha arte.`); }
    function removerSelecionado() { canvas.getActiveObjects().forEach(o => canvas.remove(o)); canvas.discardActiveObject(); reestruturarAmbiente(); }
    function toggleGuide() { const m = document.getElementById('guideModal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }

    const saved = localStorage.getItem('vitrine_project');
    if (saved) { canvas.loadFromJSON(saved, () => { canvas.renderAll(); history = [saved]; historyIndex = 0; setTimeout(reestruturarAmbiente, 500); }); }
    else { addPulseira('adulto'); toggleGuide(); }
</script>
</body>
</html>
