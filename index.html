<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personalizador | Vitrine Acessórios</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vitrine-blue: #1b31e0; --primary: #007bff; --bg: #f1f5f9; }
        
        /* Prevenção de gestos nativos que causam o "follow" */
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
            touch-action: none; /* Bloqueia o pan do navegador no corpo inteiro */
        }
        
        .brand-header { 
            background: var(--vitrine-blue); color: white; padding: 5px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 30; height: 60px; box-sizing: border-box;
        }

        .brand-logo { display: flex; align-items: center; height: 100%; }
        .brand-logo img { 
            max-height: 45px; /* TRAVA A LOGO AQUI */
            width: auto; object-fit: contain; 
        }

        .toolbar { 
            background: #fff; padding: 10px; border-bottom: 1px solid #ddd; 
            display: flex; gap: 10px; align-items: center; overflow-x: auto; 
            z-index: 20; touch-action: pan-x; /* Permite scroll lateral apenas nos botões */
        }
        
        .group { display: flex; flex-direction: column; gap: 5px; border-right: 1px solid #eee; padding-right: 10px; flex-shrink: 0; }
        label { font-size: 8px; font-weight: bold; color: #888; text-transform: uppercase; }
        .btn { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; background: white; font-weight: bold; font-size: 10px; display: flex; align-items: center; gap: 4px; }
        .btn-add { background: var(--primary); color: white; border: none; }
        .color-palette { display: flex; gap: 4px; align-items: center; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(0,0,0,0.2); }

        .workspace { 
            flex: 1; overflow: auto !important; padding: 20px; 
            background: #475569; display: block;
            touch-action: pan-x pan-y !important; /* Libera scroll apenas aqui */
        }
        
        canvas { box-shadow: 0 0 50px rgba(0,0,0,0.5); border-radius: 4px; }
        
        .footer-actions { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: white; 
            padding: 10px; border-top: 2px solid #ddd; display: flex; 
            justify-content: center; gap: 6px; z-index: 40; 
        }
        
        .btn-exp { border: none; padding: 10px 4px; font-size: 10px; font-weight: bold; border-radius: 6px; color: white; cursor: pointer; flex: 1; text-align: center; }
    </style>
</head>
<body>

<div class="brand-header">
    <div class="brand-logo">
        <img src="logo.png" alt="Vitrine Acessórios">
    </div>
    <div style="font-size: 10px; font-weight: bold;">SIMULADOR V1.2</div>
</div>

<div class="toolbar">
    <div class="group"><label>1. Modelos</label><div style="display:flex; gap:4px;"><button class="btn btn-add" onclick="addPulseira('adulto')">ADULTO</button><button class="btn btn-add" onclick="addPulseira('infantil')" style="background:#6f42c1">INFANTIL</button></div></div>
    <div class="group"><label>2. Criar</label><div style="display:flex; gap:4px;"><button class="btn" onclick="addTexto()">+ TEXTO</button><button class="btn" onclick="document.getElementById('imgInp').click()">+ FOTO</button><input type="file" id="imgInp" hidden onchange="uploadImg(this)"></div></div>
    <div class="group"><label>3. Cores</label><div class="color-palette"><div class="color-dot" style="background:#FF1493" onclick="mudarCor('#FF1493')"></div><div class="color-dot" style="background:#0000FF" onclick="mudarCor('#0000FF')"></div><div class="color-dot" style="background:#000000" onclick="mudarCor('#000000')"></div><div class="color-dot" style="background:#CCFF00" onclick="mudarCor('#CCFF00')"></div><input type="color" oninput="mudarCor(this.value)" style="width:24px; height:24px; border:none; background:none; cursor:pointer;"></div></div>
    <div class="group" style="border:none;"><label>4. Ações</label><div style="display:flex; gap:4px;"><button class="btn" onclick="undo()">↩</button><button class="btn" style="color:#ef4444" onclick="removerSelecionado()">🗑</button></div></div>
</div>

<div class="workspace">
    <canvas id="c"></canvas>
</div>

<div class="footer-actions">
    <div style="display:flex; flex-direction:column; gap:4px; flex:1;"><button class="btn-exp" style="background:#0ea5e9" onclick="baixarPNG()">SALVAR PNG</button><button class="btn-exp" style="background:#f59e0b; font-size:9px;" onclick="exportarSVG()">SALVAR SVG</button></div>
    <div style="display:flex; flex-direction:column; gap:4px; flex:1;"><button class="btn-exp" style="background:#22c55e" onclick="enviarWhatsRepresentante()">ORÇAMENTO</button><button class="btn-exp" style="background:#128C7E" onclick="enviarWhatsEcommerce()">JÁ COMPREI</button></div>
</div>

<script>
    const canvas = new fabric.Canvas('c', { 
        width: 1000, height: 650, backgroundColor: '#ffffff', 
        selection: true, allowTouchScrolling: true,
        stopContextMenu: true 
    });

    fabric.Object.prototype.set({
        transparentCorners: false, cornerColor: '#1b31e0', cornerSize: 32, padding: 15,
        touchCornerSize: 40 // Área de toque ainda maior para redimensionar
    });

    // --- BLINDAGEM DE TOQUE (FIM DO FOLLOW) ---
    canvas.on('mouse:down', function(opt) {
        if (opt.target) {
            canvas.allowTouchScrolling = false; // Trava para editar
        } else {
            canvas.allowTouchScrolling = true; // Libera para rolar tela
            canvas.discardActiveObject().requestRenderAll(); 
        }
    });

    canvas.on('mouse:up', function() {
        canvas.allowTouchScrolling = true;
        saveToLocalStorage();
    });

    // Impede que o toque "vaze" para fora do canvas
    canvas.on('mouse:move', function(opt) {
        if (canvas.allowTouchScrolling && !canvas.getActiveObject()) {
            return; // Se estiver rolando a tela, não processa movimento de objeto
        }
    });

    function saveToLocalStorage() {
        const json = JSON.stringify(canvas.toJSON(['isPulseira', 'tipoRef', 'isLegenda', 'selectable', 'hasControls']));
        localStorage.setItem('vitrine_simulador_save', json);
    }

    function loadFromLocalStorage() {
        const savedData = localStorage.getItem('vitrine_simulador_save');
        if (savedData) {
            canvas.loadFromJSON(savedData, () => {
                canvas.requestRenderAll();
                setTimeout(reestruturarAmbiente, 100);
            });
            return true;
        }
        return false;
    }

    function uploadImg(input) { 
        if (input.files[0]) { 
            const r = new FileReader(); 
            r.onload = (e) => { 
                fabric.Image.fromURL(e.target.result, (img) => { 
                    img.scaleToWidth(180); img.set({ left: 400, top: 200 });
                    canvas.add(img); img.setCoords(); canvas.setActiveObject(img);
                    setTimeout(() => { canvas.requestRenderAll(); saveToLocalStorage(); }, 150);
                }); 
            }; 
            r.readAsDataURL(input.files[0]); 
            input.value = '';
        } 
    }

    function addPulseira(tipo) {
        fabric.loadSVGFromURL(`${tipo === 'adulto' ? 'pulseira-adulto.svg' : 'pulseira-infantil.svg'}`, (objects, options) => {
            const p = fabric.util.groupSVGElements(objects, options);
            p.set({ isPulseira: true, tipoRef: tipo, hasControls: false, lockMovementX: true, lockMovementY: true });
            p.scaleToWidth(tipo === 'adulto' ? 900 : 750);
            canvas.add(p); p.sendToBack(); reestruturarAmbiente();
            saveToLocalStorage();
        });
    }

    function reestruturarAmbiente() {
        const pulseiras = canvas.getObjects().filter(obj => obj.isPulseira);
        canvas.getObjects().filter(obj => obj.isLegenda).forEach(l => canvas.remove(l));
        let currentY = 70;
        pulseiras.forEach(p => {
            p.set({ top: currentY, left: 45 }).setCoords();
            const legenda = new fabric.Text(p.tipoRef.toUpperCase(), {
                left: 50, top: currentY - 25, fontSize: 11, fill: '#94a3b8', selectable: false, isLegenda: true, fontWeight: 'bold'
            });
            canvas.add(legenda); currentY += 280;
        });
        canvas.setHeight(Math.max(650, currentY)); canvas.requestRenderAll();
    }

    function mudarCor(c) {
        const selecionados = canvas.getActiveObjects();
        selecionados.forEach(obj => {
            if (obj.type.includes('text')) obj.set('fill', c);
            else if (obj.isPulseira) obj.getObjects().forEach(ch => { ch.set('fill', c); ch.set('stroke', c); });
            else if (obj.type === 'image') {
                obj.filters = [new fabric.Image.filters.BlendColor({ color: c, mode: 'tint', alpha: 1 })];
                obj.applyFilters();
            }
        });
        canvas.requestRenderAll(); saveToLocalStorage();
    }

    function addTexto() { 
        const t = new fabric.IText('Clique aqui', { left: 400, top: 150, fontSize: 35, fill: '#333', fontFamily: 'Inter', fontWeight: 'bold' }); 
        canvas.add(t); canvas.setActiveObject(t); canvas.requestRenderAll();
    }

    function removerSelecionado() {
        canvas.getActiveObjects().forEach(o => {
            if (o.isPulseira) { if (canvas.getObjects().filter(obj => obj.isPulseira).length > 1) canvas.remove(o); } 
            else canvas.remove(o);
        });
        canvas.discardActiveObject(); reestruturarAmbiente(); saveToLocalStorage();
    }

    let undoStack = [];
    function undo() { if (undoStack.length > 1) { undoStack.pop(); const state = undoStack[undoStack.length-1]; canvas.loadFromJSON(state, () => { canvas.renderAll(); }); } }
    canvas.on('object:modified', () => { undoStack.push(JSON.stringify(canvas.toJSON())); });

    function enviarWhatsRepresentante() { window.open(`https://api.whatsapp.com/send?phone=5518981212934&text=Olá!`); }
    function enviarWhatsEcommerce() { window.open(`https://api.whatsapp.com/send?phone=551836424452&text=Olá!`); }
    function baixarPNG() { const l = document.createElement('a'); l.download = 'arte.png'; l.href = canvas.toDataURL({ multiplier: 3 }); l.click(); }
    function exportarSVG() { const b = new Blob([canvas.toSVG()], { type: 'image/svg+xml' }); const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = 'arte.svg'; l.click(); }
    function toggleGuide() { alert("Use o fundo cinza para mover a tela e toque no item para editar."); }

    window.onload = () => { if (!loadFromLocalStorage()) addPulseira('adulto'); };
</script>
</body>
</html>
