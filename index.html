<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizador Oficial | Vitrine Acessórios</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --vitrine-blue: #1b31e0; --primary: #007bff; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .brand-header { background: var(--vitrine-blue); color: white; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .brand-logo img { height: 45px; }
        .toolbar { background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; gap: 15px; align-items: center; z-index: 10; }
        .group { display: flex; flex-direction: column; gap: 4px; border-right: 1px solid #eee; padding-right: 12px; }
        label { font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; }
        .btn { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; background: white; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-add { background: var(--primary); color: white; border: none; }
        .workspace { flex: 1; display: flex; justify-content: center; align-items: flex-start; background: #cbd5e1; padding-top: 30px; overflow-y: auto; }
        canvas { box-shadow: 0 0 25px rgba(0,0,0,0.15); background-color: white; }
        .footer-actions { background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; justify-content: center; gap: 15px; }
        .btn-action { color: white; border: none; padding: 12px 25px; font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="brand-header">
    <div class="brand-logo"><img src="logo.png" alt="Vitrine Acessórios"></div>
    <div style="font-size: 12px; font-weight: bold;">SUPORTE: (18) 3642-4452</div>
</div>

<div class="toolbar">
    <div class="group">
        <label>1. Pulseiras</label>
        <div style="display:flex; gap:5px;">
            <button class="btn btn-add" onclick="addPulseira('adulto')">+ Adulto</button>
            <button class="btn btn-add" onclick="addPulseira('infantil')" style="background:#6f42c1">+ Infantil</button>
        </div>
    </div>
    <div class="group">
        <label>2. Ferramentas</label>
        <div style="display:flex; gap:5px;">
            <button class="btn" onclick="addTexto()">+ Texto</button>
            <input type="color" id="colorPicker" onchange="mudarCor(this.value)" style="width:30px; height:33px; cursor:pointer;">
            <button class="btn" style="color:red" onclick="removerSelecionado()">Apagar</button>
            <button class="btn" style="background:#333; color:white" onclick="limparTudo()">Limpar Tudo</button>
        </div>
    </div>
</div>

<div class="workspace">
    <canvas id="c"></canvas>
</div>

<div class="footer-actions">
    <button class="btn-action" style="background: #0ea5e9;" onclick="baixarImagem()">⬇ BAIXAR ARTE</button>
    <button class="btn-action" style="background: #22c55e;" onclick="enviarWhatsApp()">✅ FINALIZAR WHATSAPP</button>
</div>

<script>
    // Canvas fixo sem Zoom/Pan complexo para evitar que os objetos "sumam"
    const canvas = new fabric.Canvas('c', { 
        width: 900, 
        height: 600, 
        backgroundColor: '#ffffff',
        preserveObjectStacking: true 
    });
    
function addPulseira(tipo) {
        const file = (tipo === 'adulto') ? 'pulseira-adulto.svg' : 'pulseira-infantil.svg';
        
        fabric.loadSVGFromURL(file, function(objects, options) {
            if (!objects) {
                alert("Erro ao carregar arquivo!");
                return;
            }
            const pulseira = fabric.util.groupSVGElements(objects, options);
            
            // --- O TRUQUE DE MESTRE: AUTO-CENTRALIZAR ---
            pulseira.set({
                isPulseira: true, 
                selectable: true,
                hasControls: false,
                lockMovementX: true, 
                lockMovementY: true
            });

            // Isso força a pulseira a resetar as coordenadas do Corel e vir para o centro
            canvas.add(pulseira);
            pulseira.center(); 
            pulseira.setCoords();

            // Ajusta o tamanho
            pulseira.scaleToWidth((tipo === 'adulto') ? 800 : 650);
            
            pulseira.sendToBack();
            reorganizar();
        });
    }

    function reorganizar() {
        const pulseiras = canvas.getObjects().filter(o => o.isPulseira);
        let currentY = 50;
        pulseiras.forEach(p => {
            p.set({ top: currentY }).setCoords();
            currentY += 280; 
        });
        canvas.setHeight(Math.max(600, currentY + 100));
        canvas.renderAll();
    }

    function addTexto() {
        const txt = new fabric.IText('Clique para editar', { 
            left: 200, 
            top: 100, 
            fontSize: 25, 
            fontFamily: 'Inter',
            fontWeight: 'bold'
        });
        canvas.add(txt).setActiveObject(txt);
    }

    function mudarCor(c) {
        const active = canvas.getActiveObjects();
        active.forEach(o => {
            if (o.isPulseira && o.getObjects) {
                o.getObjects().forEach(child => child.set('fill', c));
            } else {
                o.set('fill', c);
            }
        });
        canvas.renderAll();
    }

    function removerSelecionado() {
        canvas.getActiveObjects().forEach(o => canvas.remove(o));
        canvas.discardActiveObject();
        reorganizar();
    }

    function limparTudo() {
        if(confirm("Limpar simulador?")) {
            canvas.clear();
            canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas));
        }
    }

    function baixarImagem() {
        const dataURL = canvas.toDataURL({ format: 'png', multiplier: 2 });
        const link = document.createElement('a');
        link.download = 'pedido-vitrine.png';
        link.href = dataURL;
        link.click();
    }

    function enviarWhatsApp() {
        window.open("https://wa.me/5518981212934?text=Olá, finalizei minha arte!");
    }
</script>
</body>
</html>
